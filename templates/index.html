<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Zoho CRM | Calendly Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
    .bg-mesh {
        background-color: #f8fafc;
        background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                          radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                          radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        background-attachment: fixed;
    }
  </style>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-0 left-0 w-full h-full opacity-30 pointer-events-none">
      <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600 rounded-full blur-[120px]"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-violet-600 rounded-full blur-[120px]"></div>
  </div>

  <div class="max-w-md w-full relative group">
    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-violet-500 rounded-[2.5rem] blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
    
    <div class="relative bg-slate-900 border border-slate-800 rounded-[2.5rem] p-10 shadow-2xl">
      <!-- Icon/Logo -->
      <div class="flex justify-center mb-8">
        <div class="relative">
            <div class="w-24 h-24 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-indigo-500/20 rotate-3 group-hover:rotate-6 transition-transform">
                <i class="ri-refresh-line text-white text-4xl animate-spin-slow"></i>
            </div>
            <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-lg">
                <img src="https://cdn.worldvectorlogo.com/logos/zoho-1.svg" alt="Zoho" class="w-6 h-6">
            </div>
        </div>
      </div>

      <div class="text-center space-y-4 mb-10">
        <h2 class="text-3xl font-extrabold tracking-tight text-white leading-tight">Sync Zoho CRM</h2>
        <p class="text-slate-400 text-sm font-medium leading-relaxed">
          Connect your organization to enable automated synchronization between Calendly events and Zoho CRM modules.
        </p>
      </div>

      <!-- Action Area -->
      <div class="space-y-6">
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Data Center Region</label>
            <div class="relative">
                <select id="zoho-region" class="w-full bg-slate-800 border-none rounded-2xl px-5 py-4 text-sm font-bold text-slate-100 appearance-none focus:ring-2 focus:ring-indigo-500/50 transition-all cursor-pointer">
                    <option value=".com">United States (.com)</option>
                    <option value=".in">India (.in)</option>
                    <option value=".eu">Europe (.eu)</option>
                    <option value=".com.au">Australia (.com.au)</option>
                    <option value=".ca">Canada (.ca)</option>
                    <option value=".com.cn">China (.com.cn)</option>
                </select>
                <i class="ri-arrow-down-s-line absolute right-5 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"></i>
            </div>
        </div>

        <button 
          id="connect-button" 
          onclick="connectZoho()"
          class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/20 hover:bg-indigo-500 hover:shadow-indigo-500/40 transition-all active:scale-95 flex items-center justify-center gap-3 overflow-hidden group/btn relative"
        >
          <div class="absolute inset-x-0 bottom-0 h-1 bg-white/20 transform translate-y-full group-hover/btn:translate-y-0 transition-transform"></div>
          <i class="ri-plug-2-line text-xl"></i>
          Connect Organization
        </button>
      </div>

      <!-- Footer Help -->
      <div class="mt-10 pt-8 border-t border-slate-800 text-center">
        <p class="text-xs font-medium text-slate-500">
           Integration managed by <span class="text-slate-300">Calendly Hub Engine</span>
        </p>
        <div class="mt-4 flex justify-center gap-4">
            <a href="https://xtracut.com/contact/" class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider hover:text-indigo-300 transition-colors">Help Center</a>
            <span class="text-slate-800">•</span>
            <a href="#" class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider hover:text-indigo-300 transition-colors">Privacy Policy</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function connectZoho() {
      const selectedRegion = document.getElementById('zoho-region').value;
      const button = document.getElementById('connect-button');
      let url = "{{ zoho_url|safe }}";
      
      url = url.replace('.com', selectedRegion);
      window.open(url, 'ZohoCRMWindow', 'width=800,height=700,scrollbars=yes,resizable=yes');
      
      // Update UI state
      button.classList.replace('bg-indigo-600', 'bg-emerald-600');
      button.innerHTML = '<i class="ri-refresh-line animate-spin"></i> Authentication Pending...';
    }
  </script>

  <style>
    @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
        animation: spin-slow 12s linear infinite;
    }
  </style>
</body>
</html>
