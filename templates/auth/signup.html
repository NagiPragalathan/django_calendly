<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Calendly Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .header-font { font-family: 'Outfit', sans-serif; }
        .form-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        input:focus { background-color: white !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[#f8fafc]">
    
    <div class="w-full max-w-xl">
        <!-- Brand -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100 mb-4">
                <i class="fa-solid fa-user-plus text-white text-2xl"></i>
            </div>
            <h1 class="header-font text-3xl font-bold text-gray-900 tracking-tight">Create your account</h1>
            <p class="text-gray-500 mt-2">Join thousands of users managing schedules better</p>
        </div>

        <div class="bg-white rounded-[2rem] p-8 md:p-10 form-shadow border border-gray-100">
            {% if messages %}
            <div class="mb-8 space-y-2">
                {% for message in messages %}
                <div class="p-4 rounded-2xl text-sm font-medium {% if message.tags == 'error' %}bg-red-50 text-red-700{% else %}bg-green-50 text-green-700{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form action="{% url 'signup' %}" method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Username -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Username</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <i class="fa-solid fa-at text-sm"></i>
                            </div>
                            <input type="text" name="username" 
                                   class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl focus:ring-0 focus:border-indigo-600 focus:bg-white transition-all outline-none" 
                                   placeholder="username" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Email Address</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <i class="fa-solid fa-envelope text-sm"></i>
                            </div>
                            <input type="email" name="email" 
                                   class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl focus:ring-0 focus:border-indigo-600 focus:bg-white transition-all outline-none" 
                                   placeholder="name@example.com" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Password</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <i class="fa-solid fa-lock text-sm"></i>
                            </div>
                            <input type="password" name="password" id="password"
                                   class="block w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl focus:ring-0 focus:border-indigo-600 focus:bg-white transition-all outline-none" 
                                   placeholder="••••••••" required>
                            <button type="button" onclick="togglePassword('password', 'eye-1')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                                <i class="fa-solid fa-eye" id="eye-1"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Confirm Password</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <i class="fa-solid fa-shield-halved text-sm"></i>
                            </div>
                            <input type="password" name="confirm_password" id="confirm_password"
                                   class="block w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl focus:ring-0 focus:border-indigo-600 focus:bg-white transition-all outline-none" 
                                   placeholder="••••••••" required>
                            <button type="button" onclick="togglePassword('confirm_password', 'eye-2')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                                <i class="fa-solid fa-eye" id="eye-2"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                            class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all duration-200 transform active:scale-[0.98]">
                        Create Account
                    </button>
                </div>
            </form>

            <div class="mt-10 pt-6 border-t border-gray-50 text-center">
                <p class="text-gray-500 text-sm">
                    Already have an account? 
                    <a href="{% url 'login' %}" class="font-bold text-indigo-600 hover:text-indigo-700">Log in instead</a>
                </p>
            </div>
        </div>
        
        <p class="mt-8 text-center text-gray-400 text-xs font-medium uppercase tracking-widest">
            &copy; 2026 Calendly Hub
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
