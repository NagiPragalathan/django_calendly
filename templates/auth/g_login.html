<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | Calendly Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .header-font { font-family: 'Outfit', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }
        .bg-gradient-mesh {
            background: radial-gradient(circle at top left, #4f46e520, transparent),
                        radial-gradient(circle at bottom right, #3b82f620, transparent),
                        #f9fafb;
        }
        .animate-float {
            animation: float 20s infinite alternate ease-in-out;
        }
        @keyframes float {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(100px, 50px) rotate(15deg); }
        }
    </style>
</head>
<body class="bg-gradient-mesh min-h-screen flex items-center justify-center p-4 relative">
    
    <!-- Animated Decoration -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400/10 rounded-full blur-[100px] animate-float"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-400/10 rounded-full blur-[100px] animate-float" style="animation-delay: -5s;"></div>

    <div class="glass-card w-full max-w-sm rounded-[2rem] p-10 text-center relative z-10">
        <!-- Logo -->
        <div class="w-20 h-20 bg-gradient-to-tr from-indigo-600 to-blue-500 rounded-3xl mx-auto flex items-center justify-center shadow-xl shadow-indigo-200 mb-8 border-4 border-white">
            <i class="fa-solid fa-calendar-check text-white text-4xl"></i>
        </div>

        <h1 class="header-font text-3xl font-bold bg-gradient-to-r from-indigo-700 to-blue-600 bg-clip-text text-transparent mb-2">
            Welcome
        </h1>
        <p class="text-gray-500 mb-10 text-sm font-medium">Continue to Calendly Hub</p>

        <div class="space-y-4">
            <!-- Google Login -->
            <a href="{% url 'google-login' %}" class="block group">
                <button class="w-full flex items-center justify-center gap-3 py-4 bg-white border border-gray-200 rounded-2xl text-gray-700 font-semibold shadow-sm hover:shadow-md hover:border-indigo-300 transition-all duration-300 group-hover:scale-[1.02]">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
                    <span>Login with Google</span>
                </button>
            </a>

            <div class="flex items-center gap-4 py-2">
                <div class="h-[1px] bg-gray-200 flex-1"></div>
                <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">Or</span>
                <div class="h-[1px] bg-gray-200 flex-1"></div>
            </div>

            <!-- Email Login -->
            <a href="{% url 'login' %}" class="block group">
                <button class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:shadow-indigo-200 hover:bg-indigo-700 transition-all duration-300 group-hover:scale-[1.02]">
                    Use Email Account
                </button>
            </a>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-100">
            <p class="text-gray-400 text-xs">By continuing, you agree to our <br> <a href="#" class="text-indigo-600 font-bold hover:underline">Terms</a> & <a href="#" class="text-indigo-600 font-bold hover:underline">Privacy Policy</a></p>
        </div>
    </div>
</body>
</html>
