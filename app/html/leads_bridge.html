<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Leads Orchestrator | Zoho Bridge</title>
    <!-- Intelligence & SDK Resources -->
    <script type="text/javascript" src="../js/lib/jquery-3.3.1.min.js"></script>
    <script src="../js/lib/ZohoEmbededAppSDK.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #0f172a; 
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }
        .container {
            text-align: center;
            padding: 3.5rem;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes card-in {
            0% { opacity: 0; transform: translateY(30px) rotateX(-10deg); }
            100% { opacity: 1; transform: translateY(0) rotateX(0deg); }
        }
        .icon-hub {
            position: relative;
            width: 80px; height: 80px;
            margin: 0 auto 2.5rem;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-hub i {
            font-size: 3.5rem;
            color: #6366f1;
            z-index: 2;
        }
        .pulse {
            position: absolute;
            width: 100%; height: 100%;
            background: #6366f1;
            border-radius: 50%;
            opacity: 0.2;
            animation: pulse-ring 2s infinite ease-out;
        }
        @keyframes pulse-ring { 
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        h2 { color: white; margin: 0; font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: -0.025em; }
        .badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border-radius: 2rem;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }
        .status-msg {
            margin-top: 2rem;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.6;
        }
        .loader-bar {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2rem;
            margin-top: 2.5rem;
            overflow: hidden;
            position: relative;
        }
        .loader-bar::after {
            content: '';
            position: absolute;
            height: 100%; width: 40%;
            background: linear-gradient(to right, #6366f1, #a855f7);
            border-radius: 2rem;
            animation: glide 1.5s infinite linear;
        }
        @keyframes glide {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-hub">
            <div class="pulse"></div>
            <i class="ri-flashlight-line"></i>
        </div>
        <h2>Leads Orchestrator</h2>
        <div class="badge" id="module-display">Initializing Protocol...</div>
        
        <p class="status-msg" id="status-text">
            Extracting Lead identity from Zoho CRM to launch specialized booking orchestration...
        </p>

        <div class="loader-bar"></div>
    </div>

    <script type="text/javascript">
        $(document).ready(function() {
            ZOHO.embeddedApp.on("PageLoad", function(data) {
                console.log("Protocol Payload Sync:", data);

                var record_id = Array.isArray(data.EntityId) ? data.EntityId[0] : data.EntityId;
                var module = data.Entity;

                if (!record_id || !module) {
                    $('#status-text').html("<span style='color:#f43f5e'>Protocol Breach: Missing Lead context.</span>");
                    return;
                }

                $('#module-display').text(module + ' Node Found');
                $('#status-text').text("Sync stabilized. Scaling into orchestration hub...");

                // Construct Target URL
                var domain = 'django-acuity-scheduling.vercel.app';
                var target_url = 'https://' + domain + '/zoho/' + module + '/' + record_id + '/booking/';

                setTimeout(function() {
                    window.location.replace(target_url);
                }, 1000);
            });

            // Initialize Bridge
            ZOHO.embeddedApp.init();
        });
    </script>
</body>
</html>
